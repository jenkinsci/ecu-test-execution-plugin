name: Third Party License Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  licenses:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "temurin"
      - name: Check Third Party Licenses
        run: ./gradlew clean checkLicense
