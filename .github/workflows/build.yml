name: Gradle Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
      runs-on: ubuntu-22.04
      steps:
      - name: Checkout Code
        uses: actions/checkout@v3.1.0
      - name: Read Plugin Version
        uses: madhead/read-java-properties@latest
        id: version
        with:
          file: gradle.properties
          property: version
          default: latest
      - name: Set Artifact Name
        id: artifactName
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "::set-output name=artifact_name::${{ github.ref_name }}"
          else
            echo "::set-output name=artifact_name::PR-${{ github.event.pull_request.number }}"
          fi
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 8
      - name: Run Gradle Build
        id: build
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.3
          arguments: build -x containerTest
      - name: Add Artifacts To Local Repository
        id: artifactCopy
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.3
          arguments: publishMavenPublicationToArtifactsRepository
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ steps.artifactName.outputs.artifact_name }}
          path: |
            build/artifacts/de/tracetronic/jenkins/plugins/ecutestexecution/${{ steps.version.outputs.value }}
          if-no-files-found: error
